<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inverted Skyscraper</title>

<style>
body{
  margin:0;
  background:linear-gradient(to bottom, #ffffff 0%, #e8e6df 100%);
  color:#111111;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

main{
  width:100%;
  max-width:900px;
  padding:80px 40px 90px 40px;
  text-align:center;
  box-sizing:border-box;
}

/* bloque superior */
.titulo1{
  font-family:"High Tower Text", "Times New Roman", serif;
  font-size:48pt;
  letter-spacing:0.12em;
  text-transform:uppercase;
  line-height:1.1;
  margin:0;
}

.titulo2{
  font-family:"High Tower Text", "Times New Roman", serif;
  font-size:21.5pt;
  letter-spacing:0.12em;
  text-transform:uppercase;
  line-height:1.2;
  margin:6px 0 0 0;
}

/* separación grande entre bloques */
.separador{
  height:210px;
}

/* bloque inferior */
.cita{
  font-family:"Times New Roman", Times, serif;
  font-size:12pt;
  line-height:1.5;
  margin:0;
}

.autor{
  font-family:"Times New Roman", Times, serif;
  font-size:12pt;
  letter-spacing:0.08em;
  text-transform:uppercase;
  line-height:1.4;
  margin:6px 0 0 0;
}
</style>
</head>

<body>
  <main>
    <p class="titulo1">INVERTED SKYSCRAPER</p>
    <p class="titulo2">WE CALL IT PROGRESS</p>

    <div class="separador"></div>

    <p class="cita">“Donde hacen un desierto, lo llaman paz.”</p>
    <p class="autor">TÁCITO</p>
  </main>
</body>
</html>
