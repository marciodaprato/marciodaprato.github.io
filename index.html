<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Inverted Skyscraper</title>

<style>
body{
  margin:0;
  background:linear-gradient(to bottom, #ffffff 0%, #e8e6df 100%);
  color:#111;
  font-family: "Times New Roman", Georgia, serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

main{
  max-width:680px;
  padding:60px 30px;
  text-align:center;
  line-height:1.8;
}

/* FRASE PRINCIPAL (SISTEMA) */
.sistema{
  font-size:1.6rem;
  letter-spacing:0.25em;
  text-transform:uppercase;
  margin-bottom:60px;
}

/* FRASE DE TACITO */
.tacito{
  font-size:1.4rem;
  margin-bottom:12px;
}

/* FIRMA */
.autor{
  font-size:0.8rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  opacity:0.5;
}
</style>
</head>

<body>

<main>

  <div class="sistema">
    INVERTED SKYSCRAPER — WE CALL IT PROGRESS
  </div>

  <div class="tacito">
    “Donde hacen un desierto, lo llaman paz.”
  </div>

  <div class="autor">
    TÁCITO
  </div>

</main>

</body>
</html>
